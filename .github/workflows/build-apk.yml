name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer_cache
          key: buildozer-docker-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-docker-

      - name: Build APK using kivy/buildozer Docker image
        run: |
          mkdir -p .buildozer_cache
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -v "${{ github.workspace }}/.buildozer_cache:/home/user/.buildozer" \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: boating-with-timmy-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Boating With Timmy v1.0.0
          body: |
            ## Boating With Timmy — Android APK

            A 16-bit retro boating game where Captain Timmy constantly
            sabotages your voyage to Treasure Island.

            ### Install
            Download the `.apk` below, transfer to your Android device,
            enable "Install from unknown sources", and run it.

            ### Controls (on-screen touch buttons)
            - **◄ ▲ ►** — Steer / Accelerate
            - **BAIL** — Bail water out of boat
            - **FIX** — Repair boat (costs fuel)
            - **YELL** — Yell at Timmy (he laughs)

            ### Requirements
            Android 7.0+ (API 24), landscape orientation.
          files: bin/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
